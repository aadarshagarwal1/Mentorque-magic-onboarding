kind = "web"
previewPath = "/"
title = "Mentorwe Onboarding"
version = "1.0.0"
id = "artifacts/mentorwe-onboarding"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25391

[services.development]
run = "pnpm --filter @workspace/mentorwe-onboarding run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mentorwe-onboarding", "run", "build" ]
publicDir = "artifacts/mentorwe-onboarding/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25391"
BASE_PATH = "/"
